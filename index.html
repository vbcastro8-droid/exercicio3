<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>

    <div>
        <div>
            <form action="index.html" method="post">

                <h1>Cadastrar usuário</h1>

                <!-- Dados pessoais -->
                <fieldset>
                    <legend>1. Dados pessoais</legend>

                    <label for="nome">Nome:</label><br>
                    <input type="text" id="nome" name="nome"><br><br>

                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email"><br><br>

                    <label for="senha">Senha:</label><br>
                    <input type="password" id="senha" name="senha"><br><br>

                    <label for="confirma_senha">Confirmar senha:</label><br>
                    <input type="password" id="confirma_senha" name="confirma_senha"><br><br>

                    <p>Idade:</p>
                    <input type="radio" id="acima17" name="idade" value="acima17">
                    <label for="acima17">Acima de 17</label><br>

                    <input type="radio" id="abaixo17" name="idade" value="abaixo17">
                    <label for="abaixo17">17 ou menos</label>
                </fieldset>

                <br>

                <!-- Perfil -->
                <fieldset>
                    <legend>2. Perfil</legend>

                    <label for="descricao">Descrição:</label><br>
                    <textarea id="descricao" name="descricao" rows="4" cols="40"></textarea><br><br>

                    <label for="perfil_trabalho">Perfil de trabalho:</label><br>
                    <select id="perfil_trabalho" name="perfil_trabalho">
                        <option value="frontend">Front End Developer</option>
                        <option value="backend">Back End Developer</option>
                        <option value="fullstack">Full Stack Developer</option>
                    </select><br><br>

                    <p>Interesses:</p>
                    <input type="checkbox" id="programador" name="interesses[]" value="programador">
                    <label for="programador">Programador</label><br>

                    <input type="checkbox" id="design" name="interesses[]" value="design">
                    <label for="design">Design</label><br>

                    <input type="checkbox" id="analista" name="interesses[]" value="analista">
                    <label for="analista">Analista</label>
                </fieldset>

                <br>

                <button type="submit">Enviar dados</button>

            </form>
        </div>
    </div>

</body>
</html>
