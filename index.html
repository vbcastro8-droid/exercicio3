<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <div>
        <div>
            <form action="index.html" method="post">
                <h1>Cadastrar usuário</h1>

                <fieldset>
                    <legend>1 Dados pessoais</legend>
                    
                    <label>Nome:</label>
                    <input type="text" name="nome"> <label>Email:</label>
                    <input type="email" name="email"> <label>Senha:</label>
                    <input type="password" name="senha"> <label>Confirma senha:</label>
                    <input type="password" name="confirma_senha"> <p>Idade:</p>
                    <input type="radio" name="idade" value="acima17"> Acima 17 <input type="radio" name="idade" value="abaixo17"> Abaixo ou igual 17 </fieldset>

                <fieldset>
                    <legend>2 Perfil</legend>

                    <label>Descrição:</label>
                    <textarea name="descricao"></textarea> <label>Perfil trabalho:</label>
                    <select name="perfil_trabalho"> <option value="frontend">Front End Developer</option>
                    </select>

                    <label>Interesses:</label>
                    <input type="checkbox" name="interesses" value="programador"> Programador <input type="checkbox" name="interesses" value="design"> Design <input type="checkbox" name="interesses" value="analista"> Analista </fieldset>

                <br>
                <button type="submit">Enviar dados</button> </form>
        </div>
    </div>
</body>
</html>
